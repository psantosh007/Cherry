
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  .cherry-app { max-width: 380px; margin: 0 auto; font-family: 'DM Sans', sans-serif; color: var(--color-text-primary); }

  /* HEADER */
  .cherry-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px 14px; border-bottom: 0.5px solid var(--color-border-tertiary); }
  .logo-mark { display: flex; align-items: center; gap: 8px; }
  .logo-icon { width: 32px; height: 32px; }
  .logo-text { font-family: 'DM Serif Display', serif; font-size: 20px; letter-spacing: -0.3px; }
  .logo-dot { color: #C0392B; }
  .header-badge { font-size: 11px; font-weight: 500; padding: 4px 10px; border-radius: 20px; background: #FDE8E8; color: #C0392B; }

  /* SCANNER */
  .scanner-section { padding: 20px 20px 0; }
  .section-label { font-size: 11px; font-weight: 500; letter-spacing: 1.2px; text-transform: uppercase; color: var(--color-text-tertiary); margin-bottom: 14px; }
  .scanner-viewport { position: relative; width: 100%; aspect-ratio: 1; border-radius: 16px; overflow: hidden; background: #0d0d0d; }
  .camera-placeholder { width: 100%; height: 100%; background: linear-gradient(145deg, #111 0%, #1a1a1a 50%, #0d0d0d 100%); }
  .scan-frame { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 58%; aspect-ratio: 1; }
  .corner { position: absolute; width: 22px; height: 22px; }
  .corner-tl { top: 0; left: 0; border-top: 2.5px solid #E74C3C; border-left: 2.5px solid #E74C3C; border-radius: 3px 0 0 0; }
  .corner-tr { top: 0; right: 0; border-top: 2.5px solid #E74C3C; border-right: 2.5px solid #E74C3C; border-radius: 0 3px 0 0; }
  .corner-bl { bottom: 0; left: 0; border-bottom: 2.5px solid #E74C3C; border-left: 2.5px solid #E74C3C; border-radius: 0 0 0 3px; }
  .corner-br { bottom: 0; right: 0; border-bottom: 2.5px solid #E74C3C; border-right: 2.5px solid #E74C3C; border-radius: 0 0 3px 0; }
  .scan-line { position: absolute; top: 0; left: 0; right: 0; height: 1.5px; background: linear-gradient(90deg, transparent 0%, #E74C3C 20%, #FF6B6B 50%, #E74C3C 80%, transparent 100%); animation: scanMove 2s ease-in-out infinite; box-shadow: 0 0 8px rgba(231,76,60,0.8); }
  @keyframes scanMove { 0% { top: 4%; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { top: 96%; opacity: 0; } }
  .scan-glow { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 62%; aspect-ratio: 1; border-radius: 10px; animation: glowPulse 2.4s ease-out infinite; pointer-events: none; }
  @keyframes glowPulse { 0% { box-shadow: 0 0 0 0 rgba(231,76,60,0.4); } 50% { box-shadow: 0 0 18px 6px rgba(231,76,60,0.15); } 100% { box-shadow: 0 0 0 0 rgba(231,76,60,0); } }
  .scan-status { position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 6px; background: rgba(0,0,0,0.65); border: 0.5px solid rgba(255,255,255,0.12); border-radius: 20px; padding: 6px 14px; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #2ECC71; box-shadow: 0 0 6px rgba(46,204,113,0.8); animation: blink 1.5s ease-in-out infinite; }
  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  .status-text { font-size: 12px; color: rgba(255,255,255,0.8); font-weight: 500; white-space: nowrap; }

  /* CTA */
  .cta-wrap { padding: 16px 20px 0; }
  .scan-btn { width: 100%; padding: 15px; border-radius: 14px; border: none; background: #C0392B; color: #fff; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 9px; transition: background 0.15s, transform 0.1s; }
  .scan-btn:hover { background: #A93226; }
  .scan-btn:active { transform: scale(0.98); }
  .scan-btn i { font-size: 19px; }

  /* SPLIT REWARD CARD */
  .reward-section { padding: 18px 20px 0; }
  .reward-split { display: grid; grid-template-columns: minmax(0,1fr) minmax(0,1fr); gap: 10px; }

  /* LEFT — points */
  .points-card { background: #C0392B; border-radius: var(--border-radius-lg); padding: 16px; display: flex; flex-direction: column; justify-content: space-between; min-height: 140px; }
  .points-card-label { font-size: 10px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: rgba(255,255,255,0.65); margin-bottom: 8px; }
  .points-value { font-size: 36px; font-weight: 500; color: #fff; line-height: 1; }
  .points-unit { font-size: 13px; color: rgba(255,255,255,0.7); margin-top: 3px; }
  .points-bar-wrap { margin-top: 12px; }
  .points-bar-track { height: 4px; background: rgba(255,255,255,0.25); border-radius: 2px; overflow: hidden; }
  .points-bar-fill { height: 100%; width: 68%; background: rgba(255,255,255,0.85); border-radius: 2px; }
  .points-bar-meta { display: flex; justify-content: space-between; margin-top: 5px; }
  .points-bar-meta span { font-size: 10px; color: rgba(255,255,255,0.6); }

  /* RIGHT — QR */
  .qr-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 14px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 140px; gap: 10px; }
  .qr-card-label { font-size: 10px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: var(--color-text-tertiary); }
  .qr-image-wrap { width: 82px; height: 82px; display: flex; align-items: center; justify-content: center; }
  .qr-user-id { font-size: 10px; color: var(--color-text-tertiary); letter-spacing: 0.5px; }

  /* MAP */
  .map-section { padding: 18px 20px 28px; }
  .map-frame { border-radius: var(--border-radius-lg); overflow: hidden; border: 0.5px solid var(--color-border-tertiary); height: 150px; position: relative; }
  .map-overlay { position: absolute; bottom: 10px; left: 10px; background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: 8px; padding: 6px 10px; display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 500; }
  .map-overlay i { color: #C0392B; font-size: 14px; }
</style>
